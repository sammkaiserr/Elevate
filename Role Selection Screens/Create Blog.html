<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Elevate - Create Post</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet"/>
<!-- Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "inverse-primary": "#adc7f7",
              "on-secondary-fixed-variant": "#3c475a",
              "on-surface-variant": "#43474e",
              "on-tertiary-fixed": "#001d37",
              "surface-container-high": "#e5e9eb",
              "on-primary-container": "#86a0cd",
              "tertiary-fixed-dim": "#9fcaff",
              "on-surface": "#181c1e",
              "inverse-on-surface": "#eef1f3",
              "on-primary": "#ffffff",
              "tertiary": "#00213e",
              "surface-container-highest": "#e0e3e5",
              "on-secondary-fixed": "#111c2c",
              "surface-container": "#ebeef0",
              "primary-fixed-dim": "#adc7f7",
              "error": "#ba1a1a",
              "on-primary-fixed-variant": "#2d476f",
              "on-background": "#181c1e",
              "primary-fixed": "#d6e3ff",
              "tertiary-container": "#003762",
              "surface-variant": "#e0e3e5",
              "background": "#f7fafc",
              "on-primary-fixed": "#001b3c",
              "secondary-fixed": "#d8e3fa",
              "on-secondary": "#ffffff",
              "surface-dim": "#d7dadc",
              "on-tertiary": "#ffffff",
              "surface-container-low": "#f1f4f6",
              "tertiary-fixed": "#d2e4ff",
              "surface-bright": "#f7fafc",
              "on-tertiary-container": "#58a2f0",
              "secondary": "#545f72",
              "on-error": "#ffffff",
              "error-container": "#ffdad6",
              "outline-variant": "#c4c6cf",
              "surface": "#f7fafc",
              "on-secondary-container": "#586377",
              "primary-container": "#1a365d",
              "on-error-container": "#93000a",
              "outline": "#74777f",
              "secondary-fixed-dim": "#bcc7dd",
              "on-tertiary-fixed-variant": "#00497e",
              "secondary-container": "#d5e0f7",
              "inverse-surface": "#2d3133",
              "primary": "#002045",
              "surface-tint": "#455f88"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "mono": ["JetBrains Mono"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, .font-headline { font-family: 'Manrope', sans-serif; }
        .editor-content:empty:before {
            content: attr(data-placeholder);
            color: #74777f;
            cursor: text;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Minimal Header -->
<header class="sticky top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-surface-container-highest">
<div class="flex items-center justify-between px-6 py-3 w-full max-w-5xl mx-auto">
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-2 rounded-full hover:bg-surface-container-low" disabled="">
<span class="material-symbols-outlined text-xl">close</span>
</button>
<div class="text-sm font-bold tracking-tight text-on-surface-variant flex items-center gap-2">
<span>Draft</span>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<span class="text-xs font-normal">Saved just now</span>
</div>
</div>
<div class="flex items-center gap-3">
<button class="px-5 py-2 text-sm font-semibold text-blue-900 bg-blue-50 hover:bg-blue-100 rounded-full transition-colors hidden sm:block">
                    Preview
                </button>
<button class="px-6 py-2 bg-gradient-to-r from-primary to-primary-container text-on-primary rounded-full font-bold shadow-md shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all text-sm flex items-center gap-2">
<span>Publish</span>
<span class="material-symbols-outlined text-sm">rocket_launch</span>
</button>
</div>
</div>
</header>
<main class="flex-1 w-full max-w-4xl mx-auto px-4 sm:px-8 pt-10 pb-24">
<!-- Category / Topic Tags -->
<div class="flex flex-wrap items-center gap-2 mb-8 group">
<button class="flex items-center gap-1.5 px-3 py-1.5 bg-surface-container-high hover:bg-surface-variant text-on-surface-variant rounded-full text-xs font-bold transition-colors">
<span class="material-symbols-outlined text-[14px]">sell</span>
                Add Topic Tags
            </button>
<span class="px-3 py-1.5 bg-blue-50 text-blue-900 border border-blue-100 rounded-full text-xs font-bold flex items-center gap-1">
                Engineering <button class="material-symbols-outlined text-[12px] opacity-60 hover:opacity-100">close</button>
</span>
</div>
<!-- Title Area -->
<div class="relative group mb-6">
<!-- Title Input -->
<textarea class="w-full bg-transparent border-none text-4xl sm:text-5xl font-extrabold font-headline text-on-surface placeholder:text-outline-variant resize-none focus:ring-0 p-0 leading-tight tracking-tight" placeholder="Your disruptive insight here..." rows="1" style="height: auto; overflow: hidden;"></textarea>
</div>
<!-- Cover Image Area -->
<div class="w-full relative rounded-2xl overflow-hidden mb-10 group bg-surface-container border border-dashed border-outline-variant/30 flex items-center justify-center min-h-[160px] sm:min-h-[240px] transition-all hover:bg-surface-container-high">
<!-- Empty State -->
<div class="text-center p-6 flex flex-col items-center gap-3">
<div class="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-2xl">add_photo_alternate</span>
</div>
<div>
<p class="text-sm font-bold text-on-surface">Add Cover Image</p>
<p class="text-xs text-on-surface-variant mt-1">16:9 ratio recommended for feed</p>
</div>
</div>
<!-- If image existed:
            <img src="..." alt="Cover" class="absolute inset-0 w-full h-full object-cover" />
            <button class="absolute top-4 right-4 bg-black/50 text-white p-2 rounded-full backdrop-blur-md opacity-0 group-hover:opacity-100 transition-opacity">
                <span class="material-symbols-outlined">delete</span>
            </button>
            -->
</div>
<!-- Editor Toolbar (Sticky below header) -->
<div class="sticky top-[60px] z-40 w-full bg-white/90 dark:bg-slate-900/90 backdrop-blur border border-surface-container-highest rounded-xl shadow-sm mb-6 flex items-center gap-1 p-1 max-w-fit mx-auto lg:mx-0 transition-transform hidden sm:flex">
<div class="flex items-center px-2 border-r border-surface-container-highest gap-1">
<button class="p-2 text-on-surface-variant hover:bg-surface-container hover:text-on-surface rounded-lg transition-colors" title="Format Bold">
<span class="material-symbols-outlined text-[20px]">format_bold</span>
</button>
<button class="p-2 text-on-surface-variant hover:bg-surface-container hover:text-on-surface rounded-lg transition-colors" title="Format Italic">
<span class="material-symbols-outlined text-[20px]">format_italic</span>
</button>
<button class="p-2 text-on-surface-variant hover:bg-surface-container hover:text-on-surface rounded-lg transition-colors" title="Format Underline">
<span class="material-symbols-outlined text-[20px]">format_underlined</span>
</button>
</div>
<div class="flex items-center px-2 border-r border-surface-container-highest gap-1">
<button class="p-2 text-on-surface-variant hover:bg-surface-container hover:text-on-surface rounded-lg transition-colors" title="Heading 1">
<span class="material-symbols-outlined text-[20px]">format_h1</span>
</button>
<button class="p-2 text-on-surface-variant hover:bg-surface-container hover:text-on-surface rounded-lg transition-colors" title="Heading 2">
<span class="material-symbols-outlined text-[20px]">format_h2</span>
</button>
</div>
<div class="flex items-center px-2 border-r border-surface-container-highest gap-1">
<button class="p-2 text-on-surface-variant hover:bg-surface-container hover:text-on-surface rounded-lg transition-colors" title="Bulleted List">
<span class="material-symbols-outlined text-[20px]">format_list_bulleted</span>
</button>
<button class="p-2 text-on-surface-variant hover:bg-surface-container hover:text-on-surface rounded-lg transition-colors" title="Numbered List">
<span class="material-symbols-outlined text-[20px]">format_list_numbered</span>
</button>
</div>
<div class="flex items-center px-2 gap-1">
<button class="p-2 text-on-surface-variant hover:bg-surface-container hover:text-on-surface rounded-lg transition-colors" title="Insert Link">
<span class="material-symbols-outlined text-[20px]">link</span>
</button>
<button class="p-2 text-on-surface-variant hover:bg-surface-container hover:text-on-surface rounded-lg transition-colors" title="Insert Code Block">
<span class="material-symbols-outlined text-[20px]">code_blocks</span>
</button>
<button class="p-2 text-blue-700 bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors ml-2" title="Elevate AI Assist">
<span class="material-symbols-outlined text-[20px]">temp_preferences_custom</span>
</button>
</div>
</div>
<!-- Inline AI Suggestion Bubble (Floating) -->
<div class="absolute right-4 md:right-12 mt-4 max-w-xs bg-gradient-to-br from-blue-900 to-primary text-white p-4 rounded-2xl rounded-tr-none shadow-xl hidden lg:block opacity-90 hover:opacity-100 transition-opacity">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-blue-300 text-lg mt-0.5">temp_preferences_custom</span>
<div>
<p class="text-xs font-medium leading-relaxed">Consider defining "disruptive insight" early on to grab executive attention. Need a hook?</p>
<button class="mt-2 text-[10px] font-bold uppercase tracking-wider text-blue-200 hover:text-white transition-colors">Generate Hook</button>
</div>
</div>
</div>
<!-- Content Editor Area -->
<div class="relative prose max-w-none w-full">
<!-- Side Insertion Menu (appears on hover of empty blocks) -->
<div class="absolute -left-12 top-0 opacity-50 hover:opacity-100 transition-opacity hidden md:flex items-center justify-center h-8 w-8 bg-surface-container-highest rounded-full cursor-pointer">
<span class="material-symbols-outlined text-lg">add</span>
</div>
<div class="w-full min-h-[400px] text-lg text-on-surface-variant leading-relaxed focus:outline-none editor-content font-body" contenteditable="true" data-placeholder="Start writing or type '/' for commands..."></div>
</div>
</main>
<!-- Mobile Only Format Bar (Fixed Bottom) -->
<div class="sm:hidden fixed bottom-0 left-0 w-full bg-white dark:bg-slate-900 border-t border-surface-container-highest p-2 flex items-center justify-around z-50">
<button class="p-3 text-on-surface-variant hover:text-on-surface rounded-xl"><span class="material-symbols-outlined">image</span></button>
<button class="p-3 text-on-surface-variant hover:text-on-surface rounded-xl"><span class="material-symbols-outlined">format_list_bulleted</span></button>
<button class="p-3 text-on-surface-variant hover:text-on-surface rounded-xl"><span class="material-symbols-outlined">link</span></button>
<button class="p-3 text-blue-700 bg-blue-50 rounded-xl"><span class="material-symbols-outlined">temp_preferences_custom</span></button>
</div>
</body></html>
