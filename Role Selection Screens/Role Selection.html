<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Elevate - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "inverse-primary": "#adc7f7",
              "on-secondary-fixed-variant": "#3c475a",
              "on-surface-variant": "#43474e",
              "on-tertiary-fixed": "#001d37",
              "surface-container-high": "#e5e9eb",
              "on-primary-container": "#86a0cd",
              "tertiary-fixed-dim": "#9fcaff",
              "on-surface": "#181c1e",
              "inverse-on-surface": "#eef1f3",
              "on-primary": "#ffffff",
              "tertiary": "#00213e",
              "surface-container-highest": "#e0e3e5",
              "on-secondary-fixed": "#111c2c",
              "surface-container": "#ebeef0",
              "primary-fixed-dim": "#adc7f7",
              "error": "#ba1a1a",
              "on-primary-fixed-variant": "#2d476f",
              "on-background": "#181c1e",
              "primary-fixed": "#d6e3ff",
              "tertiary-container": "#003762",
              "surface-variant": "#e0e3e5",
              "background": "#f7fafc",
              "on-primary-fixed": "#001b3c",
              "secondary-fixed": "#d8e3fa",
              "on-secondary": "#ffffff",
              "surface-dim": "#d7dadc",
              "on-tertiary": "#ffffff",
              "surface-container-low": "#f1f4f6",
              "tertiary-fixed": "#d2e4ff",
              "surface-bright": "#f7fafc",
              "on-tertiary-container": "#58a2f0",
              "secondary": "#545f72",
              "on-error": "#ffffff",
              "error-container": "#ffdad6",
              "outline-variant": "#c4c6cf",
              "surface": "#f7fafc",
              "on-secondary-container": "#586377",
              "primary-container": "#1a365d",
              "on-error-container": "#93000a",
              "outline": "#74777f",
              "secondary-fixed-dim": "#bcc7dd",
              "on-tertiary-fixed-variant": "#00497e",
              "secondary-container": "#d5e0f7",
              "inverse-surface": "#2d3133",
              "primary": "#002045",
              "surface-tint": "#455f88"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', sans-serif;
      }
      h1, h2, h3 {
        font-family: 'Manrope', sans-serif;
      }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- Top Navigation (Shell suppressed for onboarding, only Brand shown) -->
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm shadow-blue-900/5">
<div class="flex items-center justify-between px-6 py-4 w-full max-w-screen-2xl mx-auto">
<span class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-900 to-blue-700">Elevate</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-6">
<div class="w-full max-w-4xl">
<!-- Hero Content -->
<div class="text-center mb-12">
<h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-primary mb-4">
                    Who are you?
                </h1>
<p class="text-on-surface-variant text-lg max-w-xl mx-auto">
                    Choose the path that best describes your current journey to personalize your Elevate experience.
                </p>
</div>
<!-- Role Selection Cards: Asymmetric Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-stretch">
<!-- Student Card -->
<button class="group relative flex flex-col text-left p-8 rounded-xl bg-surface-container-lowest border-2 border-transparent hover:border-primary-container transition-all duration-300 shadow-sm hover:shadow-xl hover:-translate-y-1">
<div class="w-16 h-16 rounded-full bg-secondary-container flex items-center justify-center mb-6 text-on-secondary-container group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-4xl" data-icon="school">school</span>
</div>
<h2 class="text-2xl font-bold text-primary mb-3">Student</h2>
<p class="text-on-surface-variant leading-relaxed mb-8">
                        Focused on academic growth, skill-building, and creating a strong foundation through campus networking.
                    </p>
<div class="mt-auto flex items-center gap-2 text-primary font-semibold text-sm tracking-wide">
                        SELECT STUDENT
                        <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</div>
<!-- Decorative Element -->
<div class="absolute top-4 right-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-6xl" data-icon="auto_awesome">auto_awesome</span>
</div>
</button>
<!-- Professional Card -->
<button class="group relative flex flex-col text-left p-8 rounded-xl bg-surface-container-lowest border-2 border-transparent hover:border-primary-container transition-all duration-300 shadow-sm hover:shadow-xl hover:-translate-y-1">
<div class="w-16 h-16 rounded-full bg-tertiary-container flex items-center justify-center mb-6 text-on-tertiary-container group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-4xl" data-icon="work">work</span>
</div>
<h2 class="text-2xl font-bold text-primary mb-3">Working Professional</h2>
<p class="text-on-surface-variant leading-relaxed mb-8">
                        Looking for career advancement, industry leadership, and meaningful mentorship opportunities.
                    </p>
<div class="mt-auto flex items-center gap-2 text-primary font-semibold text-sm tracking-wide">
                        SELECT PROFESSIONAL
                        <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</div>
<!-- Decorative Element -->
<div class="absolute top-4 right-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-6xl" data-icon="trending_up">trending_up</span>
</div>
</button>
</div>
<!-- Footer Action Area -->
<div class="mt-16 flex flex-col items-center gap-6">
<button class="w-full max-w-xs py-4 px-8 bg-gradient-to-r from-primary to-primary-container text-on-primary rounded-full font-bold text-lg shadow-lg hover:shadow-primary/20 transition-all active:scale-95 duration-100 flex items-center justify-center gap-2">
                    Next
                    <span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
<div class="flex items-center gap-2 text-on-surface-variant text-sm font-medium">
<span>Already have an account?</span>
<a class="text-primary font-bold hover:underline" href="#">Log in</a>
</div>
</div>
</div>
</main>
<!-- Bottom Background Decorative Shift (No-Line Rule) -->
<div class="fixed bottom-0 left-0 w-full h-1/4 bg-surface-container-low -z-10 pointer-events-none"></div>
<!-- Visual Polish: Abstract Elements -->
<div class="fixed top-20 right-10 w-64 h-64 bg-primary-container/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-10 left-10 w-96 h-96 bg-secondary-container/10 rounded-full blur-3xl -z-10"></div>
</body></html>
